name: Inspektor
options:
  bundleIdPrefix: com.inspektor
  deploymentTarget:
    iOS: "18.0"
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: NO

targets:
  Inspektor:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Inspektor
        excludes:
          - "**/*.md"
          - "**/*.json"
    resources:
      - path: Inspektor/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inspektor.app
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.2.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
